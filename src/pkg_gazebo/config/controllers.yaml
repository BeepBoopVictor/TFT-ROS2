controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    fp3_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    fp3_hand_controller:
      type: position_controllers/GripperActionController


joint_state_broadcaster:
  ros__parameters:
    use_local_topics: false


fp3_arm_controller:
  ros__parameters:
    joints:
      - fp3_joint1
      - fp3_joint2
      - fp3_joint3
      - fp3_joint4
      - fp3_joint5
      - fp3_joint6
      - fp3_joint7

    command_interfaces:
      - position

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_nonzero_velocity_at_trajectory_end: false

    constraints:
      goal_time: 3.0
      stopped_velocity_tolerance: 0.01

      fp3_joint1:
        trajectory: 0.2
        goal: 0.05
      fp3_joint2:
        trajectory: 0.2
        goal: 0.05
      fp3_joint3:
        trajectory: 0.2
        goal: 0.05
      fp3_joint4:
        trajectory: 0.2
        goal: 0.05
      fp3_joint5:
        trajectory: 0.2
        goal: 0.05
      fp3_joint6:
        trajectory: 0.2
        goal: 0.05
      fp3_joint7:
        trajectory: 0.2
        goal: 0.05


fp3_hand_controller:
  ros__parameters:
    joint: fp3_finger_joint1
    goal_tolerance: 0.002
    max_effort: 70.0
    stall_velocity_threshold: 0.001
    stall_timeout: 1.0